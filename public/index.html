        // then call function to update the segment sizes.
        this.numSegments --;
        this.updateSegmentSizes();
    }
}

// ====================================================================================================================
// This function takes the x an the y of a mouse event, such as click or move, and converts the x and the y in to
// co-ordinates on the canvas as the raw values are the x and the y from the top and left of the user's browser.
// ====================================================================================================================
Winwheel.prototype.windowToCanvas = function(x, y)
{
    let bbox = this.canvas.getBoundingClientRect();

    return {
        x: Math.floor(x - bbox.left * (this.canvas.width / bbox.width)),
        y: Math.floor(y - bbox.top *  (this.canvas.height / bbox.height))
    };
}

// ====================================================================================================================
// This function returns the segment object located at the specified x and y coordinates on the canvas.
// It is used to allow things to be done with a segment clicked by the user, such as highlight, display or change some values, etc.
// ====================================================================================================================
Winwheel.prototype.getSegmentAt = function(x, y)
{
    let foundSegment = null;

    // Call function to return segment number.
    let segmentNumber = this.getSegmentNumberAt(x, y);

    // If found one then set found segment to pointer to the segment object.
    if (segmentNumber !== null) {
        foundSegment = this.segments[segmentNumber];
    }

    return foundSegment;
}

// ====================================================================================================================
// Returns the number of the segment clicked instead of the segment object.
// This does not work correctly if the canvas width or height is altered by CSS but does work correctly with the scale factor.
// ====================================================================================================================
Winwheel.prototype.getSegmentNumberAt = function(x, y)
{
    // Call function above to convert the raw x and y from the user's browser to canvas coordinates
    // i.e. top and left is top and left of canvas, not top and left of the user's browser.
    let loc = this.windowToCanvas(x, y);

    // ------------------------------------------
    // Now start the process of working out the segment clicked.
    // First we need to figure out the angle of an imaginary line between the centerX and centerY of the wheel and
    // the X and Y of the location (for example a mouse click).
    let topBottom;
    let leftRight;
    let adjacentSideLength;
    let oppositeSideLength;
    let hypotenuseSideLength;

    // Get the centerX and centerY scaled with the scale factor, also the same for outer and inner radius.
    let centerX = (this.centerX * this.scaleFactor);
    let centerY = (this.centerY * this.scaleFactor);
    let outerRadius = (this.outerRadius * this.scaleFactor);
    let innerRadius = (this.innerRadius * this.scaleFactor);

    // We will use right triangle maths with the TAN function.
    // The start of the triangle is the wheel center, the adjacent side is along the x axis, and the opposite side is along the y axis.

    // We only ever use positive numbers to work out the triangle and the center of the wheel needs to be considered as 0 for the numbers
    // in the maths which is why there is the subtractions below. We also remember what quadrant of the wheel the location is in as we
    // need this information later to add 90, 180, 270 degrees to the angle worked out from the triangle to get the position around a 360 degree wheel.
    if (loc.x > centerX) {
        adjacentSideLength = (loc.x - centerX);
        leftRight = 'R';    // Location is in the right half of the wheel.
    } else {
        adjacentSideLength = (centerX - loc.x);
        leftRight = 'L';    // Location is in the left half of the wheel.
    }

    if (loc.y > centerY) {
        oppositeSideLength = (loc.y - centerY);
        topBottom = 'B';    // Bottom half of wheel.
    } else {
        oppositeSideLength = (centerY - loc.y);
        topBottom = 'T';    // Top Half of wheel.
    }

    // Now divide opposite by adjacent to get tan value.
    let tanVal = oppositeSideLength / adjacentSideLength;

    // Use the tan function and convert results to degrees since that is what we work with.
    let result = (Math.atan(tanVal) * 180/Math.PI);
    let locationAngle = 0;

    // We also need the length of the hypotenuse as later on we need to compare this to the outerRadius of the segment / circle.
    hypotenuseSideLength = Math.sqrt((oppositeSideLength * oppositeSideLength) + (adjacentSideLength * adjacentSideLength));

    // ------------------------------------------
    // Now to make sense around the wheel we need to alter the values based on if the location was in top or bottom half
    // and also right or left half of the wheel, by adding 90, 180, 270 etc. Also for some the initial locationAngle needs to be inverted.
    if ((topBottom == 'T') && (leftRight == 'R')) {
        locationAngle = Math.round(90 - result);
    } else if ((topBottom == 'B') && (leftRight == 'R')) {
        locationAngle = Math.round(result + 90);
    } else if ((topBottom == 'B') && (leftRight == 'L')) {
        locationAngle = Math.round((90 - result) + 180);
    } else if ((topBottom == 'T') && (leftRight == 'L')) {
        locationAngle = Math.round(result + 270);
    }

    // ------------------------------------------
    // And now we have to adjust to make sense when the wheel is rotated from the 0 degrees either
    // positive or negative and it can be many times past 360 degrees.
    if (this.rotationAngle != 0) {
        let rotatedPosition = this.getRotationPosition();

        // So we have this, now we need to alter the locationAngle as a result of this.
        locationAngle = (locationAngle - rotatedPosition);

        // If negative then take the location away from 360.
        if (locationAngle < 0) {
            locationAngle = (360 - Math.abs(locationAngle));
        }
    }

    // ------------------------------------------
    // OK, so after all of that we have the angle of a line between the centerX and centerY of the wheel and
    // the X and Y of the location on the canvas where the mouse was clicked. Now time to work out the segment
    // this corresponds to. We can use the segment start and end angles for this.
    let foundSegmentNumber = null;

    for (let x = 1; x <= this.numSegments; x ++) {
        // Due to segments sharing start and end angles, if line is clicked will pick earlier segment.
        if ((locationAngle >= this.segments[x].startAngle) && (locationAngle <= this.segments[x].endAngle)) {
            // To ensure that a click anywhere on the canvas in the segment direction will not cause a
            // segment to be matched, as well as the angles, we need to ensure the click was within the radius
            // of the segment (or circle if no segment radius).

            // If the hypotenuseSideLength (length of location from the center of the wheel) is with the radius
            // then we can assign the segment to the found segment and break out the loop.

            // Have to take in to account hollow wheels (doughnuts) so check is greater than innerRadius as
            // well as less than or equal to the outerRadius of the wheel.
            if ((hypotenuseSideLength >= innerRadius) && (hypotenuseSideLength <= outerRadius)) {
                foundSegmentNumber = x;
                break;
            }
        }
    }

    // Finally return the number.
    return foundSegmentNumber;
}

// ====================================================================================================================
// Returns a reference to the segment that is at the location of the pointer on the wheel.
// ====================================================================================================================
Winwheel.prototype.getIndicatedSegment = function()
{
    // Call function below to work this out and return the prizeNumber.
    let prizeNumber = this.getIndicatedSegmentNumber();

    // Then simply return the segment in the segments array at that position.
    return this.segments[prizeNumber];
}

// ====================================================================================================================
// Works out the segment currently pointed to by the pointer of the wheel. Normally called when the spinning has stopped
// to work out the prize the user has won. Returns the number of the segment in the segments array.
// ====================================================================================================================
Winwheel.prototype.getIndicatedSegmentNumber = function()
{
    let indicatedPrize = 0;
    let rawAngle = this.getRotationPosition();

    // Now we have the angle of the wheel, but we need to take in to account where the pointer is because
    // will not always be at the 12 o'clock 0 degrees location.
    let relativeAngle = Math.floor(this.pointerAngle - rawAngle);

    if (relativeAngle < 0) {
        relativeAngle = 360 - Math.abs(relativeAngle);
    }

    // Now we can work out the prize won by seeing what prize segment startAngle and endAngle the relativeAngle is between.
    for (let x = 1; x < (this.segments.length); x ++) {
        if ((relativeAngle >= this.segments[x]['startAngle']) && (relativeAngle <= this.segments[x]['endAngle'])) {
            indicatedPrize = x;
            break;
        }
    }

    return indicatedPrize;
}

// ====================================================================================================================
// Works out what Pin around the wheel is considered the current one which is the one which just passed the pointer.
// Used to work out if the pin has changed during the animation to tigger a sound.
// ====================================================================================================================
Winwheel.prototype.getCurrentPinNumber = function()
{
    let currentPin = 0;

    if (this.pins) {
        let rawAngle = this.getRotationPosition();

        // Now we have the angle of the wheel, but we need to take in to account where the pointer is because
        // will not always be at the 12 o'clock 0 degrees location.
        let relativeAngle = Math.floor(this.pointerAngle - rawAngle);

        if (relativeAngle < 0) {
            relativeAngle = 360 - Math.abs(relativeAngle);
        }

        // Work out the angle of the pins as this is simply 360 / the number of pins as they space evenly around.
        let pinSpacing = (360 / this.pins.number);
        let totalPinAngle = 0;

        // Now we can work out the pin by seeing what pins relativeAngle is between.
        for (let x = 0; x < (this.pins.number); x ++) {
            if ((relativeAngle >= totalPinAngle) && (relativeAngle <= (totalPinAngle + pinSpacing))) {
                currentPin = x;
                break;
            }

            totalPinAngle += pinSpacing;
        }

        // Now if rotating clockwise we must add 1 to the current pin as we want the pin which has just passed
        // the pointer to be returned as the current pin, not the start of the one we are between.
        if (this.animation.direction == 'clockwise') {
            currentPin ++;

            if (currentPin > this.pins.number) {
                currentPin = 0;
            }
        }
    }

    return currentPin;
}

// ==================================================================================================================================================
// Returns the rotation angle of the wheel corrected to 0-360 (i.e. removes all the multiples of 360).
// ==================================================================================================================================================
Winwheel.prototype.getRotationPosition = function()
{
    let rawAngle = this.rotationAngle;  // Get current rotation angle of wheel.

    // If positive work out how many times past 360 this is and then take the floor of this off the rawAngle.
    if (rawAngle >= 0) {
        if (rawAngle > 360) {
            // Get floor of the number of times past 360 degrees.
            let timesPast360 = Math.floor(rawAngle / 360);

            // Take all this extra off to get just the angle 0-360 degrees.
            rawAngle = (rawAngle - (360 * timesPast360));
        }
    } else {
        // Is negative, need to take off the extra then convert in to 0-360 degree value
        // so if, for example, was -90 then final value will be (360 - 90) = 270 degrees.
        if (rawAngle < -360) {
            let timesPast360 = Math.ceil(rawAngle / 360);   // Ceil when negative.

            rawAngle = (rawAngle - (360 * timesPast360));   // Is minus because dealing with negative.
        }

        rawAngle = (360 + rawAngle);    // Make in the range 0-360. Is plus because raw is still negative.
    }

    return rawAngle;
}

// ==================================================================================================================================================
// This function starts the wheel's animation by using the properties of the animation object of of the wheel to begin the a greensock tween.
// ==================================================================================================================================================
Winwheel.prototype.startAnimation = function()
{
    if (this.animation) {
        // Call function to compute the animation properties.
        this.computeAnimation();

        // Set this global variable to this object as an external function is required to call the draw() function on the wheel
        // each loop of the animation as Greensock cannot call the draw function directly on this class.
        winwheelToDrawDuringAnimation = this;

        // Put together the properties of the greesock animation.
        let properties = new Array(null);
        properties[this.animation.propertyName] = this.animation.propertyValue; // Here we set the property to be animated and its value.
        properties['yoyo']       = this.animation.yoyo;     // Set others.
        properties['repeat']     = this.animation.repeat;
        properties['ease']       = this.animation.easing;
        properties['onUpdate']   = winwheelAnimationLoop;   // Call function to re-draw the canvas.
        properties['onComplete'] = winwheelStopAnimation;   // Call function to perform actions when animation has finished.

        // Do the tween animation passing the properties from the animation object as an array of key => value pairs.
        // Keep reference to the tween object in the wheel as that allows pausing, resuming, and stopping while the animation is still running.
        this.tween = TweenMax.to(this, this.animation.duration, properties);
    }
}

// ==================================================================================================================================================
// Use same function which needs to be outside the class for the callback when it stops because is finished.
// ==================================================================================================================================================
Winwheel.prototype.stopAnimation = function(canCallback)
{
    // @TODO as part of multiwheel, need to work out how to stop the tween for a single wheel but allow others to continue.

    // We can kill the animation using our tween object.
    if (winwheelToDrawDuringAnimation) {
        // If the wheel has a tween animation then kill it.
        if (winwheelToDrawDuringAnimation.tween) {
            winwheelToDrawDuringAnimation.tween.kill();
        }

        // Call the callback function.
        winwheelStopAnimation(canCallback);
    }

    // Ensure the winwheelToDrawDuringAnimation is set to this class.
    winwheelToDrawDuringAnimation = this;
}

// ==================================================================================================================================================
// Pause animation by telling tween to pause.
// ==================================================================================================================================================
Winwheel.prototype.pauseAnimation = function()
{
    if (this.tween) {
        this.tween.pause();
    }
}

// ==================================================================================================================================================
// Resume the animation by telling tween to continue playing it.
// ==================================================================================================================================================
Winwheel.prototype.resumeAnimation = function()
{
    if (this.tween) {
        this.tween.play();
    }
}

// ====================================================================================================================
// Called at the beginning of the startAnimation function and computes the values needed to do the animation
// before it starts. This allows the developer to change the animation properties after the wheel has been created
// and have the animation use the new values of the animation properties.
// ====================================================================================================================
Winwheel.prototype.computeAnimation = function()
{
    if (this.animation) {
        // Set the animation parameters for the specified animation type including some sensible defaults if values have not been specified.
        if (this.animation.type == 'spinOngoing') {
            // When spinning the rotationAngle is the wheel property which is animated.
            this.animation.propertyName = 'rotationAngle';

            if (this.animation.spins == null) {
                this.animation.spins = 5;
            }

            if (this.animation.repeat == null) {
                this.animation.repeat = -1;           // -1 means it will repeat forever.
            }

            if (this.animation.easing == null) {
                this.animation.easing = 'Linear.easeNone';
            }

            if (this.animation.yoyo == null) {
                this.animation.yoyo = false;
            }

            // We need to calculate the propertyValue and this is the spins * 360 degrees.
            this.animation.propertyValue = (this.animation.spins * 360);

            // If the direction is anti-clockwise then make the property value negative.
            if (this.animation.direction == 'anti-clockwise') {
                this.animation.propertyValue = (0 - this.animation.propertyValue);
            }
        } else if (this.animation.type == 'spinToStop') {
            // Spin to stop the rotation angle is affected.
            this.animation.propertyName = 'rotationAngle';

            if (this.animation.spins == null) {
                this.animation.spins = 5;
            }

            if (this.animation.repeat == null) {
                this.animation.repeat = 0;        // As this is spin to stop we don't normally want it repeated.
            }

            if (this.animation.easing == null) {
                this.animation.easing = 'Power3.easeOut';     // This easing is fast start and slows over time.
            }

            if (this.animation.stopAngle == null) {
                // If the stop angle has not been specified then pick random between 0 and 359.
                this.animation._stopAngle = Math.floor((Math.random() * 359));
            } else {
                // We need to set the internal to 360 minus what the user entered because the wheel spins past 0 without
                // this it would indicate the prize on the opposite side of the wheel. We aslo need to take in to account
                // the pointerAngle as the stop angle needs to be relative to that.
                this.animation._stopAngle = (360 - this.animation.stopAngle + this.pointerAngle);
            }

            if (this.animation.yoyo == null) {
                this.animation.yoyo = false;
            }

            // The property value is the spins * 360 then plus or minus the stopAngle depending on if the rotation is clockwise or anti-clockwise.
            this.animation.propertyValue = (this.animation.spins * 360);

            if (this.animation.direction == 'anti-clockwise') {
                this.animation.propertyValue = (0 - this.animation.propertyValue);

                // Also if the value is anti-clockwise we need subtract the stopAngle (but to get the wheel to stop in the correct
                // place this is 360 minus the stop angle as the wheel is rotating backwards).
                this.animation.propertyValue -= (360 - this.animation._stopAngle);
            } else {
                // Add the stopAngle to the propertyValue as the wheel must rotate around to this place and stop there.
                this.animation.propertyValue += this.animation._stopAngle;
            }
        } else if (this.animation.type == 'spinAndBack') {
            // This is basically is a spin for a number of times then the animation reverses and goes back to start.
            // If a repeat is specified then this can be used to make the wheel "rock" left and right.

            // Again this is a spin so the rotationAngle the property which is animated.
            this.animation.propertyName = 'rotationAngle';

            if (this.animation.spins == null) {
                this.animation.spins = 5;
            }

            if (this.animation.repeat == null) {
                this.animation.repeat = 1;          // This needs to be set to at least 1 in order for the animation to reverse.
            }

            if (this.animation.easing == null) {
                this.animation.easing = 'Power2.easeInOut';     // This is slow at the start and end and fast in the middle.
            }

            if (this.animation.yoyo == null) {
                this.animation.yoyo = true;       // This needs to be set to true to have the animation reverse back like a yo-yo.
            }

            if (this.animation.stopAngle == null) {
                this.animation._stopAngle = 0;
            } else {
                // We need to set the internal to 360 minus what the user entered
                // because the wheel spins past 0 without this it would indicate the
                // prize on the opposite side of the wheel.
                this.animation._stopAngle = (360 - this.animation.stopAngle);
            }

            // The property value is the spins * 360 then plus or minus the stopAngle depending on if the rotation is clockwise or anti-clockwise.
            this.animation.propertyValue = (this.animation.spins * 360);

            if (this.animation.direction == 'anti-clockwise') {
                this.animation.propertyValue = (0 - this.animation.propertyValue);

                // Also if the value is anti-clockwise we need subtract the stopAngle (but to get the wheel to stop in the correct
                // place this is 360 minus the stop angle as the wheel is rotating backwards).
                this.animation.propertyValue -= (360 - this.animation._stopAngle);
            } else {
                // Add the stopAngle to the propertyValue as the wheel must rotate around to this place and stop there.
                this.animation.propertyValue += this.animation._stopAngle;
            }
        } else if (this.animation.type == 'custom') {
            // Do nothing as all values must be set by the developer in the parameters
            // especially the propertyName and propertyValue.
        }
    }
}

// ====================================================================================================================
// Calculates and returns a random stop angle inside the specified segment number. Value will always be 1 degree inside
// the start and end of the segment to avoid issue with the segment overlap.
// ====================================================================================================================
Winwheel.prototype.getRandomForSegment = function(segmentNumber)
{
    let stopAngle = 0;

    if (segmentNumber) {
        if (typeof this.segments[segmentNumber] !== 'undefined') {
            let startAngle = this.segments[segmentNumber].startAngle;
            let endAngle = this.segments[segmentNumber].endAngle;
            let range = (endAngle - startAngle) - 2;

    vars = vars || {};
    vars.duration = duration;
    return gsap.to(target, vars);
  }
};

</script>
<style>
  :root{
    --hejo-950:#170a2e; --hejo-900:#24123f; --hejo-800:#341a5c;
    --hejo-600:#6a26c9; --hejo-500:#8b3ce8; --hejo-300:#c896f7;
    --yellow:#ffe000; --yellow-dark:#e0c400;
    --cream:#ffffff; --ink:#0c1f13; --muted:#e3d3f7;
    --font-body:'Poppins', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background-color:#170a2e;
    background-image:
      url('https://i.postimg.cc/gJgyKbqz/image-(2)-(1).png');
    background-size:cover; background-position:center; background-attachment:scroll;
    background-repeat:no-repeat;
    color:var(--cream); font-family:var(--font-body);
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    display:flex; justify-content:center; align-items:center;
    padding:32px 16px; overflow-x:hidden; position:relative;
  }

  /* ambient falling confetti/rain */
  .rain{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;}
  .rain span{
    position:absolute; top:-5%; width:6px; height:6px; border-radius:50%;
    background:var(--yellow); opacity:.7; animation:fall linear infinite;
  }
  .rain span:nth-child(odd){background:var(--hejo-300); width:5px; height:5px;}
  @keyframes fall{ to{ transform:translateY(115vh); opacity:0; } }

  .stage{
    position:relative; z-index:1; width:100%; max-width:1000px;
    display:flex; align-items:center; justify-content:center; gap:56px;
  }

  /* ---------- Wheel ---------- */
  .wheel-col{display:flex; flex-direction:column; align-items:center; flex-shrink:0;}
  .wheel-wrap{position:relative; width:min(400px,80vw); height:min(400px,80vw);}
  .pointer{
    position:absolute; top:-30px; left:50%; transform:translateX(-50%);
    width:15%; min-width:46px; max-width:64px; z-index:6;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,.55));
    animation:pointerBounce 1.3s linear infinite;
  }
  @keyframes pointerBounce{ 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-10px);} }
  .wheel-rgb-ring{
    position:absolute; inset:-3px; border-radius:50%; z-index:0;
    background:conic-gradient(from 0deg, #ff3d5a,#ff9d3d,#f3e93d,#3dff8f,#3dc8ff,#8f3dff,#ff3d5a);
    animation:rgbSpin 3s linear infinite;
  }
  @keyframes rgbSpin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  .wheel-outer-ring{
    position:absolute; inset:0; border-radius:50%; z-index:1;
    background:conic-gradient(from 0deg, var(--yellow), var(--hejo-500), var(--yellow));
    box-shadow:
      0 20px 45px rgba(0,0,0,.55),
      0 8px 16px rgba(0,0,0,.4);
    padding:8px;
  }
  .wheel{
    position:relative; width:100%; height:100%; border-radius:50%; overflow:hidden;
    box-shadow:inset 0 0 0 4px rgba(0,0,0,.3), 0 0 0 6px var(--hejo-950);
    background:var(--hejo-600);
  }
  /* Winwheel.js draws directly onto this canvas — real canvas text
     rendering, same engine the reference BIGSLOTO wheel uses, so label
     position/curvature/centring is handled by the library, not CSS hacks. */
  #wheel-canvas{
    display:block; width:100%; height:100%; border-radius:50%;
  }
  /* glossy dome overlay: light from top-left, shade at bottom-right,
     plus inset shadows so the flat canvas reads as a curved 3D disc */
  .wheel::after{
    content:''; position:absolute; inset:0; border-radius:50%;
    pointer-events:none; z-index:5;
    background:
      radial-gradient(circle at 30% 18%, rgba(255,255,255,.38), transparent 38%),
      radial-gradient(circle at 72% 88%, rgba(0,0,0,.38), transparent 48%);
    box-shadow:
      inset 0 10px 22px rgba(0,0,0,.35),
      inset 0 -8px 16px rgba(0,0,0,.25),
      inset 0 2px 4px rgba(255,255,255,.15);
  }
  /* chasing lights: one bulb per prize slice, flashing in sequence around
     the rim like a classic carnival prize-wheel light chase */
  .wheel-lights{
    position:absolute; inset:0; z-index:2; pointer-events:none;
  }
  .wheel-light{
    position:absolute; width:10px; height:10px; margin:-5px 0 0 -5px;
    border-radius:50%;
    background:#a8895a;
    box-shadow:0 0 3px 1px rgba(255,255,255,.25), inset 0 0 0 1px rgba(0,0,0,.3);
    animation-name:lightChase; animation-timing-function:linear; animation-iteration-count:infinite;
  }
  .wheel-light.wheel-light-inner{
    width:7px; height:7px; margin:-3.5px 0 0 -3.5px;
  }
  @keyframes lightChase{
    0%{ opacity:1; background:#fff9d6; box-shadow:0 0 10px 4px rgba(255,247,180,.95), 0 0 20px 10px rgba(255,224,0,.55); }
    12%{ opacity:.4; background:#a8895a; box-shadow:0 0 3px 1px rgba(255,255,255,.25); }
    100%{ opacity:.4; background:#a8895a; box-shadow:0 0 3px 1px rgba(255,255,255,.25); }
  }
  .hub{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:26%; height:26%; border-radius:50%; z-index:4;
    background:radial-gradient(circle at 35% 30%, #fff, #f1e6fc);
    box-shadow:0 0 0 5px var(--hejo-950), 0 4px 10px rgba(0,0,0,.5), 0 0 0 0 rgba(255,224,0,.6);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    animation:hubGlow 1.8s ease-in-out infinite;
  }
  @keyframes hubGlow{
    0%,100%{ box-shadow:0 0 0 5px var(--hejo-950), 0 4px 10px rgba(0,0,0,.5), 0 0 0 0 rgba(255,224,0,.55); }
    50%{ box-shadow:0 0 0 5px var(--hejo-950), 0 4px 10px rgba(0,0,0,.5), 0 0 14px 8px rgba(255,224,0,.45); }
  }
  .hub::after{
    content:''; position:absolute; inset:0; z-index:5; pointer-events:none;
    background:linear-gradient(115deg, transparent 40%, rgba(255,255,255,.75) 50%, transparent 60%);
    background-size:220% 220%;
    animation:hubShine 2.6s linear infinite;
  }
  @keyframes hubShine{
    0%{ background-position:130% -30%; }
    100%{ background-position:-30% 130%; }
  }
  .hub img{ width:82%; height:82%; object-fit:contain; position:relative; z-index:3; }

  /* ---------- Form panel ---------- */
  .panel{width:100%; max-width:340px;}
  .panel h2{
    font-size:clamp(18px,3.2vw,22px); font-weight:700; margin:0 0 18px; color:var(--cream); text-align:center;
  }
  .rgb-wrap{
    position:relative; border-radius:999px;
  }
  @keyframes rgbFlow{ 0%{background-position:0% 50%;} 100%{background-position:400% 50%;} }

  .entry-row{ display:flex; align-items:stretch; gap:10px; }
  .entry-row .rgb-wrap{ flex:1; min-width:0; }

  .voucher-input-wrap, .name-input-wrap{
    border-radius:999px; overflow:hidden;
    border:2px solid rgba(139,60,232,.85);
    background:rgba(255,255,255,.32);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:
      0 4px 0 rgba(139,60,232,.55),
      0 10px 20px rgba(0,0,0,.35),
      inset 0 2px 3px rgba(255,255,255,.7),
      inset 0 -3px 6px rgba(0,0,0,.15);
  }
  .voucher-input-wrap input[type=text], .name-input-wrap input[type=text]{
    width:100%; border:none; outline:none; background:transparent;
    padding:15px 18px; font-family:var(--font-body); font-size:14px; color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,.45);
  }
  .voucher-input-wrap input::placeholder, .name-input-wrap input::placeholder{color:rgba(255,255,255,.8);}

  /* separate circular spin button, sits beside the voucher field */
  .rgb-wrap-circle{
    position:relative; border-radius:50%; flex-shrink:0;
  }
  .btn-spin-circle{
    position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center;
    width:56px; height:56px; border-radius:50%;
    border:2px solid rgba(139,60,232,.85);
    background:rgba(255,255,255,.32);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:
      0 4px 0 rgba(139,60,232,.55),
      0 10px 18px rgba(0,0,0,.35),
      inset 0 2px 3px rgba(255,255,255,.7),
      inset 0 -3px 6px rgba(0,0,0,.15);
    color:#fff; font-weight:700; letter-spacing:.02em; text-shadow:0 1px 2px rgba(0,0,0,.45);
    cursor:pointer; text-transform:uppercase; font-size:11px; transition:.1s;
  }
  .btn-spin-circle:active{
    transform:translateY(3px);
    box-shadow:
      0 1px 0 rgba(139,60,232,.55),
      0 4px 8px rgba(0,0,0,.3),
      inset 0 2px 3px rgba(255,255,255,.6),
      inset 0 -2px 4px rgba(0,0,0,.1);
  }
  .btn-spin-circle::after{
    content:''; position:absolute; top:0; left:-150%; width:55%; height:100%;
    background:linear-gradient(115deg, transparent, rgba(255,255,255,.75), transparent);
    transform:skewX(-20deg); animation:shineMove 2.2s ease-in-out infinite;
  }
  @keyframes shineMove{ 0%{left:-150%;} 55%{left:150%;} 100%{left:150%;} }
  .btn-spin-circle:hover{background:rgba(255,255,255,.45);}
  .btn-spin-circle:disabled{opacity:.5; cursor:not-allowed;}

  .rgb-wrap-name{ margin-top:12px; }

  .btn-full-wrap{
    position:relative; border-radius:999px; padding:1px; margin-top:14px;
    background:linear-gradient(90deg,#ff3d5a,#ff9d3d,#f3e93d,#3dff8f,#3dc8ff,#8f3dff,#ff3d5a);
    background-size:400% 400%; animation:rgbFlow 5s linear infinite;
    box-shadow:0 8px 22px rgba(0,0,0,.4);
  }
  .btn-full{
    position:relative; overflow:hidden;
    font-family:var(--font-body); font-weight:700; font-size:14px; letter-spacing:.04em;
    cursor:pointer; border:1px solid rgba(139,60,232,.85); border-radius:999px; padding:15px 18px;
    width:100%; text-transform:uppercase; transition:.15s;
    background:rgba(255,224,0,.55);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    color:var(--ink);
  }
  .btn-full::after{
    content:''; position:absolute; top:0; left:-150%; width:55%; height:100%;
    background:linear-gradient(115deg, transparent, rgba(255,255,255,.85), transparent);
    transform:skewX(-20deg); animation:shineMove 2.2s ease-in-out infinite;
  }
  .btn-full:hover{background:rgba(224,196,0,.65);}
  .btn-full:disabled{opacity:.5; cursor:not-allowed;}

  .btn-secondary{
    font-family:var(--font-body); font-weight:700; font-size:13px; letter-spacing:.04em;
    cursor:pointer; border:1px solid rgba(139,60,232,.85);
    background:rgba(139,60,232,.2);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    color:#fff;
    border-radius:999px; padding:13px 18px; width:100%; margin-top:14px; text-transform:uppercase;
  }
  .btn-secondary:hover{background:rgba(139,60,232,.4);}

  /* ---------- Toast-style message ---------- */
  #sound-toggle{
    position:fixed; top:16px; right:16px; z-index:25;
    width:42px; height:42px; border-radius:50%;
    border:1px solid rgba(139,60,232,.85);
    background:rgba(139,60,232,.35);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; padding:0;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));
  }
  #sound-toggle:hover{background:rgba(139,60,232,.55);}
  #sound-toggle svg{width:20px; height:20px; fill:#fff;}

  #msgbox{position:fixed; top:70px; right:18px; z-index:80; max-width:320px; width:calc(100% - 36px);}
  .toast-msg{
    display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border-radius:10px;
    font-size:13px; box-shadow:0 10px 26px rgba(0,0,0,.4); animation:toastIn .25s ease;
    border-left:4px solid;
  }
  @keyframes toastIn{ from{transform:translateY(-10px); opacity:0;} to{transform:translateY(0); opacity:1;} }
  .toast-msg.error{background:#3a1015; color:#ffb3bb; border-color:#e2352a;}
  .toast-msg.ok{background:#0b3a1d; color:#9be8b4; border-color:var(--hejo-500);}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(3,15,8,.85);
    display:flex; align-items:center; justify-content:center;
    z-index:60; padding:20px; animation:fadeIn .25s ease;
  }
  @keyframes fadeIn{from{opacity:0} to{opacity:1}}
  .modal-card{width:100%; max-width:340px; animation:popIn .5s cubic-bezier(.17,.85,.15,1);}
  @keyframes popIn{
    0%{transform:scale(.55) translateY(10px); opacity:0;}
    65%{transform:scale(1.06); opacity:1;}
    100%{transform:scale(1) translateY(0);}
  }
  .confetti-row{font-size:26px; letter-spacing:6px; text-align:center; margin-bottom:10px; animation:confettiBounce 1s ease-in-out infinite alternate;}

  #confetti-burst{
    position:fixed; inset:0; z-index:65; pointer-events:none; overflow:hidden;
  }
  .confetti-piece{
    position:absolute; top:-5%; width:8px; height:14px; opacity:.95;
    animation-name:confettiFall; animation-timing-function:ease-in; animation-fill-mode:forwards;
  }
  @keyframes confettiFall{
    0%{ transform:translate(0,0) rotate(0deg); opacity:1; }
    100%{ transform:translate(calc(var(--dx) * 140px), 115vh) rotate(var(--rot)); opacity:.15; }
  }
  @keyframes confettiBounce{ from{transform:translateY(0) rotate(-4deg);} to{transform:translateY(-6px) rotate(4deg);} }
  .result-banner{
    text-align:center; padding:28px 20px; border-radius:18px; margin-bottom:16px;
    background:linear-gradient(155deg, var(--hejo-500), var(--hejo-800) 85%);
    box-shadow:0 14px 30px rgba(0,0,0,.5); position:relative; overflow:hidden;
  }
  .result-banner::before{
    content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 30% 20%, rgba(255,255,255,.28), transparent 45%);
    animation:glowPulse 2.2s ease-in-out infinite;
  }
  @keyframes glowPulse{ 0%,100%{opacity:.5;} 50%{opacity:1;} }
  .result-banner .selamat{font-size:13px; letter-spacing:.1em; text-transform:uppercase; opacity:.9; position:relative; color:#fff;}
  .result-banner .prize-won{font-weight:900; font-size:26px; margin:6px 0 0; position:relative; color:var(--yellow);}

  .hidden{display:none !important;}

  #site-logo{
    position:fixed; top:16px; left:16px; z-index:20;
    width:130px; height:auto;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
  }

  @media (max-width:760px){
    .stage{flex-direction:column; gap:30px;}
    .panel{max-width:340px;}
    #site-logo{
      width:100px; top:12px; left:12px;
    }
  }
</style>
</head>

<script>
function showMsg(text, type){
  const box = document.getElementById('msgbox');
  box.innerHTML = `<div class="toast-msg ${type}">${text}</div>`;
  setTimeout(()=>{ box.innerHTML=''; }, 4000);
}

/* ---------------------------------------------------------------
   Background audio: browsers block autoplay-with-sound, so we start
   muted (which autoplay is always allowed to do) and let the user
   tap the top-right icon to turn sound on. This avoids console
   errors and works reliably across browsers/devices.
----------------------------------------------------------------- */
(function initAudio(){
  const audio = document.getElementById('bg-audio');
  const btn = document.getElementById('sound-toggle');
  const iconOn = document.getElementById('icon-sound-on');
  const iconOff = document.getElementById('icon-sound-off');

  function setIcon(muted){
    iconOn.style.display = muted ? 'none' : 'block';
    iconOff.style.display = muted ? 'block' : 'none';
  }

  audio.muted = true;
  setIcon(true);
  audio.play().catch(()=>{ /* ignore — will start once user taps the icon */ });

  btn.onclick = ()=>{
    audio.muted = !audio.muted;
    if(!audio.muted){ audio.play().catch(()=>{}); }
    setIcon(audio.muted);
  };
})();

let activePrizes = [];
let pendingCode = null;
let pendingFixedPrizeId = null;
let winnerPrize = null;
let theWheel = null;

document.getElementById('btn-check-code').onclick = async (e)=>{
  e.preventDefault();
  const codeVal = document.getElementById('code-input').value.trim().toUpperCase();
  if(!codeVal){ showMsg('Masukkan kode undian terlebih dahulu.', 'error'); return; }
  const btnCheck = document.getElementById('btn-check-code');
  btnCheck.disabled = true;
  try{
    const res = await fetch('/api/check-code', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code: codeVal })
    });
    const data = await res.json();
    btnCheck.disabled = false;
    if(!data.valid){ showMsg(data.message || 'Kode tidak valid.', 'error'); return; }
    pendingCode = codeVal;
    pendingFixedPrizeId = data.fixedPrizeId || null;
    activePrizes = data.prizes;
    buildWheel(activePrizes);
    document.getElementById('spin-entry').classList.add('hidden');
    document.getElementById('spin-wheel-area').classList.remove('hidden');
  }catch(e){
    btnCheck.disabled = false;
    showMsg('Gagal menghubungi server. Cek koneksi internet.', 'error');
  }
};

function pickWeighted(prizes){
  const total = prizes.reduce((s,p)=>s+p.weight,0);
  let r = Math.random()*total;
  for(const p of prizes){ if(r < p.weight) return p; r -= p.weight; }
  return prizes[prizes.length-1];
}

/* ---------------------------------------------------------------
   buildWheel — canvas-based, using Winwheel.js (the same library
   the reference wheel uses). The library itself handles curved,
   centered text per segment, so this only needs to:
   1) size the canvas to the actual rendered wheel box, and
   2) auto-shrink each segment's own font so long prize names
      ("Hadiah Utama") never collide with short ones ("50.000").
----------------------------------------------------------------- */
/* ---------------------------------------------------------------
   buildWheelLights — one bulb per prize slice, fixed in place
   (they don't spin with the canvas). Each bulb's animation-delay is
   staggered so they flash in sequence, one after another around the
   wheel — a classic "chasing lights" carnival-wheel effect.
   Called twice: once for the outer rim ring, once for an inner ring
   closer to the hub.
----------------------------------------------------------------- */
function buildWheelLights(n, containerId, radiusPercent, extraClass){
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  const perLightInterval = 0.18; // seconds between one bulb lighting and the next
  const totalCycle = n * perLightInterval;

  for(let i=0; i<n; i++){
    const angleDeg = (i + 0.5) * (360/n);
    const rad = angleDeg * Math.PI/180;
    const x = 50 + radiusPercent * Math.sin(rad);
    const y = 50 - radiusPercent * Math.cos(rad);

    const bulb = document.createElement('div');
    bulb.className = extraClass ? 'wheel-light ' + extraClass : 'wheel-light';
    bulb.style.left = x + '%';
    bulb.style.top = y + '%';
    bulb.style.animationDuration = totalCycle + 's';
    bulb.style.animationDelay = (i * perLightInterval) + 's';
    container.appendChild(bulb);
  }
}

function buildWheel(prizes){
  const canvas = document.getElementById('wheel-canvas');
  const box = canvas.parentElement;
  const size = Math.round(box.getBoundingClientRect().width) || 400;
  canvas.width = size;
  canvas.height = size;

  const n = prizes.length;
  buildWheelLights(n, 'wheel-lights', 48);
  buildWheelLights(n, 'wheel-lights-inner', 20, 'wheel-light-inner');

  const outerRadius = size/2 - 2;
  const innerRadius = size * 0.14; // stays clear of the center hub overlay

  const segAngleRad = (360/n) * Math.PI/180;
  const midRadius = (outerRadius+innerRadius)/2;
  const availableWidthPx = 2 * midRadius * Math.sin(segAngleRad/2) * 0.82;
  const maxFont = Math.max(9, Math.min(20, Math.round(outerRadius*0.11)));
  const minFont = 7;

  const mctx = buildWheel._mctx || (buildWheel._mctx = document.createElement('canvas').getContext('2d'));
  function measure(text, fontPx){
    mctx.font = `700 ${fontPx}px 'Poppins', sans-serif`;
    return mctx.measureText(text).width;
  }

  const segments = prizes.map(p=>{
    let fontSize = maxFont;
    while(fontSize > minFont && measure(p.name, fontSize) > availableWidthPx){
      fontSize -= 0.5;
    }
    return {
      fillStyle: p.color,
      text: p.name,
      textFillStyle: p.textColor || '#000',
      textFontSize: fontSize
    };
  });

  theWheel = new Winwheel({
    canvasId: 'wheel-canvas',
    numSegments: n,
    outerRadius: outerRadius,
    innerRadius: innerRadius,
    textFontFamily: "'Poppins', sans-serif",
    textFontWeight: '700',
    textOrientation: 'horizontal',
    textAlignment: 'center',
    textMargin: 3,
    strokeStyle: 'rgba(0,0,0,0.15)',
    lineWidth: 1,
    segments: segments,
    animation: {
      type: 'spinToStop',
      duration: 4.5,
      spins: 8,
      callbackFinished: onSpinComplete
    }
  });
}

/* ---------------------------------------------------------------
   Sound effects — synthesized directly with the Web Audio API so no
   extra audio files are needed (keeps the page light). Covers: button
   click, the wheel's ratchet "ticking" while it spins, and an
   applause-like burst (layered filtered noise) for the win moment.
----------------------------------------------------------------- */
let sfxCtx = null;
function getSfxCtx(){
  if(!sfxCtx) sfxCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(sfxCtx.state === 'suspended') sfxCtx.resume();
  return sfxCtx;
}

function sfxClick(){
  const ctx = getSfxCtx();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(320, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(120, ctx.currentTime+0.08);
  g.gain.setValueAtTime(0.3, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.09);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.09);
}

function sfxTick(){
  const ctx = getSfxCtx();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(1100, ctx.currentTime);
  g.gain.setValueAtTime(0.16, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.035);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.035);
}

// schedules ticks that bunch up fast at the start and spread out near
// the end, matching the wheel's ease-out deceleration
function sfxSpinTicks(durationSec){
  const totalTicks = 46;
  for(let i=0;i<totalTicks;i++){
    const p = i/totalTicks;
    const eased = 1 - Math.pow(1-p, 2.4);
    setTimeout(sfxTick, eased * durationSec * 1000);
  }
}

function sfxApplause(){
  const ctx = getSfxCtx();
  const now = ctx.currentTime;
  const burstCount = 55;
  for(let i=0;i<burstCount;i++){
    const t = now + Math.random()*1.3;
    const bufferSize = Math.floor(ctx.sampleRate * 0.03);
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let j=0;j<bufferSize;j++){ data[j] = (Math.random()*2-1) * (1 - j/bufferSize); }
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 2000 + Math.random()*2200;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.22 + Math.random()*0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.05);
    noise.connect(bp); bp.connect(g); g.connect(ctx.destination);
    noise.start(t);
  }
}

function sfxWinChime(){
  const ctx = getSfxCtx();
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((freq, i)=>{
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'triangle';
    const t0 = ctx.currentTime + i*0.12;
    o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(0.26, t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t0+0.6);
    o.connect(g); g.connect(ctx.destination);
    o.start(t0); o.stop(t0+0.6);
  });
}

function burstConfetti(){
  const container = document.getElementById('confetti-burst');
  container.innerHTML = '';
  const colors = ['#ffe000','#8b3ce8','#3dff8f','#3dc8ff','#ff3d5a','#ffffff'];
  const count = 60;
  for(let i=0;i<count;i++){
    const el = document.createElement('span');
    el.className = 'confetti-piece';
    el.style.left = (40 + Math.random()*20) + '%';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.setProperty('--dx', (Math.random()*2-1).toFixed(2));
    el.style.setProperty('--rot', (Math.random()*720-360)+'deg');
    el.style.animationDuration = (2.2 + Math.random()*1.4)+'s';
    el.style.animationDelay = (Math.random()*0.3)+'s';
    container.appendChild(el);
  }
  setTimeout(()=>{ container.innerHTML=''; }, 4000);
}

function onSpinComplete(){
  finishSpin();
}

document.getElementById('btn-spin-now').onclick = ()=>{
  const btn = document.getElementById('btn-spin-now');
  btn.disabled = true;
  sfxClick();

  let winner = null;
  if(pendingFixedPrizeId){
    winner = activePrizes.find(p=>p.id===pendingFixedPrizeId) || null;
  }
  if(!winner) winner = pickWeighted(activePrizes);
  winnerPrize = winner;

  // Winwheel segments are 1-indexed
  const winnerIndex = activePrizes.findIndex(p=>p.id===winner.id) + 1;
  theWheel.animation.spins = 8;
  theWheel.animation.stopAngle = theWheel.getRandomForSegment(winnerIndex);
  theWheel.startAnimation();
  sfxSpinTicks(theWheel.animation.duration);
};

async function finishSpin(){
  const name = document.getElementById('name-input').value.trim();
  showMsg('Menyimpan hasil...', 'ok');
  try{
    const res = await fetch('/api/finish-spin', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code: pendingCode, prizeId: winnerPrize.id, name })
    });
    const data = await res.json();
    if(data.status !== 'ok'){
      showMsg(data.message || 'Terjadi kesalahan saat menyimpan hasil.', 'error');
      document.getElementById('spin-wheel-area').classList.add('hidden');
      document.getElementById('spin-entry').classList.remove('hidden');
      document.getElementById('btn-spin-now').disabled = false;
      return;
    }
    document.getElementById('result-prize-name').textContent = data.prizeName;
    document.getElementById('spin-wheel-area').classList.add('hidden');
    document.getElementById('spin-result').classList.remove('hidden');
    document.getElementById('btn-spin-now').disabled = false;
    burstConfetti();
    sfxApplause();
    sfxWinChime();
  }catch(e){
    showMsg('Gagal menghubungi server. Coba lagi.', 'error');
    document.getElementById('btn-spin-now').disabled = false;
  }
}

document.getElementById('btn-spin-again').onclick = ()=>{
  document.getElementById('spin-result').classList.add('hidden');
  document.getElementById('spin-entry').classList.remove('hidden');
  document.getElementById('spin-wheel-area').classList.add('hidden');
  document.getElementById('code-input').value='';
  document.getElementById('name-input').value='';
  pendingCode=null; pendingFixedPrizeId=null; winnerPrize=null;
};
